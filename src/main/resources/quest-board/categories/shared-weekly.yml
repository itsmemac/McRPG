# Weekly quests visible to all players — harder objectives, better rewards, slower rotation.
shared-weekly:
  # SHARED: all players see the same offerings from this category.
  visibility: SHARED
  refresh-type: WEEKLY
  refresh-interval: 7d
  completion-time: 7d
  scope-provider: mcrpg:single_player
  min: 1
  max: 3
  chance-per-slot: 0.8
  priority: 5
