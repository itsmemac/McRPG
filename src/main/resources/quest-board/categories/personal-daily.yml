# Personal daily quests — unique per player. Each player sees different offerings
# generated deterministically from their UUID and the rotation epoch.
# Prerequisite-gated legendary templates only appear on personal boards.
personal-daily:
  # PERSONAL: each player gets a unique set of offerings.
  visibility: PERSONAL
  refresh-type: DAILY
  refresh-interval: 1d
  completion-time: 1d
  scope-provider: mcrpg:single_player
  min: 1
  max: 3
  chance-per-slot: 1.0
  priority: 8
