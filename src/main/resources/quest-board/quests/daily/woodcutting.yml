# Daily woodcutting quests for the quest board.

quests:
  # -------------------------------------------------------------------
  # Easy: Chop common logs
  # -------------------------------------------------------------------
  mcrpg:daily_timber_run:
    display:
      name: "Timber Run"
      description: "Chop down common trees"
      objectives:
        daily_chop_common_logs: "Chop common logs"
      rewards:
        woodcutting_xp: "Woodcutting XP"
    scope: mcrpg:single_player
    expiration: 24h
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:common
        - mcrpg:uncommon
      supported-refresh-types:
        - DAILY
    rewards:
      woodcutting_xp:
        type: mcrpg:experience
        skill: WOODCUTTING
        amount: 1500
    phases:
      chop:
        completion-mode: ALL
        stages:
          chop_common:
            key: mcrpg:daily_chop_common
            objectives:
              chop_common_logs:
                key: mcrpg:daily_chop_common_logs
                type: mcrpg:block_break
                required-progress: 48
                config:
                  blocks:
                    - OAK_LOG
                    - BIRCH_LOG
                    - SPRUCE_LOG

  # -------------------------------------------------------------------
  # Medium: Chop exotic logs
  # -------------------------------------------------------------------
  mcrpg:daily_exotic_lumber:
    display:
      name: "Exotic Lumber"
      description: "Harvest exotic wood from rare biomes"
      objectives:
        daily_chop_exotic_logs: "Chop exotic logs"
      rewards:
        woodcutting_xp: "Woodcutting XP"
        stick_bonus: "Sticks"
    scope: mcrpg:single_player
    expiration: 24h
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:uncommon
        - mcrpg:rare
      supported-refresh-types:
        - DAILY
    rewards:
      woodcutting_xp:
        type: mcrpg:experience
        skill: WOODCUTTING
        amount: 3000
      stick_bonus:
        type: mcrpg:item
        item:
          material: STICK
        amount: 16
    phases:
      chop:
        completion-mode: ALL
        stages:
          chop_exotic:
            key: mcrpg:daily_chop_exotic
            objectives:
              chop_exotic_logs:
                key: mcrpg:daily_chop_exotic_logs
                type: mcrpg:block_break
                required-progress: 32
                config:
                  blocks:
                    - JUNGLE_LOG
                    - DARK_OAK_LOG
                    - ACACIA_LOG

  # -------------------------------------------------------------------
  # Easy: Break leaves
  # -------------------------------------------------------------------
  mcrpg:daily_leaf_clearing:
    display:
      name: "Leaf Clearing"
      description: "Clear out leaves from the forest"
      objectives:
        daily_break_leaves: "Break leaves"
      rewards:
        woodcutting_xp: "Woodcutting XP"
    scope: mcrpg:single_player
    expiration: 24h
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:common
      supported-refresh-types:
        - DAILY
    rewards:
      woodcutting_xp:
        type: mcrpg:experience
        skill: WOODCUTTING
        amount: 1000
    phases:
      clear:
        completion-mode: ALL
        stages:
          clear_leaves:
            key: mcrpg:daily_clear_leaves
            objectives:
              break_leaves:
                key: mcrpg:daily_break_leaves
                type: mcrpg:block_break
                required-progress: 64
                config:
                  blocks:
                    - OAK_LEAVES
                    - BIRCH_LEAVES
                    - SPRUCE_LEAVES
                    - JUNGLE_LEAVES
