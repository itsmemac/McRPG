# Legendary quests for the quest board — rare, prestigious challenges.

quests:
  # -------------------------------------------------------------------
  # Legendary: Mine diamonds and ancient debris for a legendary pickaxe
  # -------------------------------------------------------------------
  mcrpg:legendary_master_smith:
    display:
      name: "Master Smith"
      description: "Gather the finest ores to forge a legendary pickaxe"
      objectives:
        legendary_break_diamond: "Mine diamond ore"
        legendary_break_debris: "Mine ancient debris"
      rewards:
        mining_xp: "Mining XP"
        master_pick: "Master Smith's Pick"
    scope: mcrpg:single_player
    expiration: 14d
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:legendary
      supported-refresh-types:
        - WEEKLY
      acceptance-cooldown: 14d
      cooldown-scope: GLOBAL
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: 20000
      master_pick:
        type: mcrpg:item
        item:
          material: DIAMOND_PICKAXE
          amount: 1
          enchantments:
            efficiency: 4
            fortune: 3
            unbreaking: 3
          name: "<gold>Master Smith's Pick"
          lore:
            - "<gray>Forged from the depths"
            - "<gray>of the world"
          settings:
            glowing: true
    phases:
      diamonds:
        completion-mode: ALL
        stages:
          mine_diamonds:
            key: mcrpg:legendary_smith_mine_diamonds
            objectives:
              break_diamond:
                key: mcrpg:legendary_break_diamond
                type: mcrpg:block_break
                required-progress: 32
                config:
                  blocks:
                    - DIAMOND_ORE
                    - DEEPSLATE_DIAMOND_ORE
      debris:
        completion-mode: ALL
        stages:
          mine_debris:
            key: mcrpg:legendary_smith_mine_debris
            objectives:
              break_debris:
                key: mcrpg:legendary_break_debris
                type: mcrpg:block_break
                required-progress: 8
                config:
                  blocks:
                    - ANCIENT_DEBRIS

  # -------------------------------------------------------------------
  # Legendary: Slay endermen, blazes, and wither skeletons for a blade
  # -------------------------------------------------------------------
  mcrpg:legendary_world_champion:
    display:
      name: "World Champion"
      description: "Prove your combat mastery across all dimensions"
      objectives:
        legendary_slay_endermen: "Slay endermen"
        legendary_slay_blazes: "Slay blazes"
        legendary_slay_wither_skeletons: "Slay wither skeletons"
      rewards:
        swords_xp: "Swords XP"
        champion_blade: "World Champion's Blade"
    scope: mcrpg:single_player
    expiration: 14d
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:legendary
      supported-refresh-types:
        - WEEKLY
      acceptance-cooldown: 14d
      cooldown-scope: GLOBAL
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: 20000
      champion_blade:
        type: mcrpg:item
        item:
          material: DIAMOND_SWORD
          amount: 1
          enchantments:
            sharpness: 4
            looting: 3
            unbreaking: 3
          name: "<gold>World Champion's Blade"
          lore:
            - "<gray>Forged in the heat of battle"
            - "<gray>across every dimension"
          settings:
            glowing: true
    phases:
      endermen:
        completion-mode: ALL
        stages:
          kill_endermen:
            key: mcrpg:legendary_champion_kill_endermen
            objectives:
              slay_endermen:
                key: mcrpg:legendary_slay_endermen
                type: mcrpg:mob_kill
                required-progress: 50
                config:
                  mobs:
                    - ENDERMAN
      blazes:
        completion-mode: ALL
        stages:
          kill_blazes:
            key: mcrpg:legendary_champion_kill_blazes
            objectives:
              slay_blazes:
                key: mcrpg:legendary_slay_blazes
                type: mcrpg:mob_kill
                required-progress: 30
                config:
                  mobs:
                    - BLAZE
      wither_skeletons:
        completion-mode: ALL
        stages:
          kill_wither_skeletons:
            key: mcrpg:legendary_champion_kill_wither
            objectives:
              slay_wither_skeletons:
                key: mcrpg:legendary_slay_wither_skeletons
                type: mcrpg:mob_kill
                required-progress: 20
                config:
                  mobs:
                    - WITHER_SKELETON

  # -------------------------------------------------------------------
  # Legendary: Trial Master — one-time only, massive combat gauntlet
  # -------------------------------------------------------------------
  mcrpg:legendary_trial_master:
    display:
      name: "Trial Master"
      description: "Complete the ultimate combat trial — once and for all"
      objectives:
        legendary_trial_overworld: "Slay overworld hostile mobs"
        legendary_trial_nether: "Slay Nether hostile mobs"
        legendary_trial_endermen: "Slay endermen"
      rewards:
        swords_xp: "Swords XP"
        heavy_core: "Heavy Core"
    scope: mcrpg:single_player
    expiration: 14d
    repeat-mode: ONCE
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:legendary
      supported-refresh-types:
        - WEEKLY
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: 25000
      heavy_core:
        type: mcrpg:item
        item:
          material: HEAVY_CORE
          amount: 1
          name: "<gold>Heavy Core"
    phases:
      overworld:
        completion-mode: ALL
        stages:
          kill_overworld:
            key: mcrpg:legendary_trial_kill_overworld
            objectives:
              slay_overworld:
                key: mcrpg:legendary_trial_overworld
                type: mcrpg:mob_kill
                required-progress: 80
                config:
                  mobs:
                    - ZOMBIE
                    - SKELETON
                    - SPIDER
                    - CREEPER
                    - WITCH
                    - ENDERMAN
      nether:
        completion-mode: ALL
        stages:
          kill_nether:
            key: mcrpg:legendary_trial_kill_nether
            objectives:
              slay_nether:
                key: mcrpg:legendary_trial_nether
                type: mcrpg:mob_kill
                required-progress: 50
                config:
                  mobs:
                    - BLAZE
                    - PIGLIN_BRUTE
                    - WITHER_SKELETON
                    - GHAST
      endermen:
        completion-mode: ALL
        stages:
          kill_endermen:
            key: mcrpg:legendary_trial_kill_endermen
            objectives:
              slay_endermen:
                key: mcrpg:legendary_trial_endermen
                type: mcrpg:mob_kill
                required-progress: 30
                config:
                  mobs:
                    - ENDERMAN
