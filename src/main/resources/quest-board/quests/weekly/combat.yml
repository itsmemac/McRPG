    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: 35000
      ominous_key:
        type: mcrpg:item
        item:
          material: OMINOUS_TRIAL_KEY
          amount: 1
    phases:
      nether:
        completion-mode: ALL
        stages:
          kill_nether:
            key: mcrpg:weekly_ominous_kill_nether
            objectives:
              slay_nether:
                key: mcrpg:weekly_ominous_nether
                type: mcrpg:mob_kill
                required-progress: 50
                config:
