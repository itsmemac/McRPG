# Weekly combat quests for the quest board.

quests:
  # -------------------------------------------------------------------
  # Hard: Nether conquest — blazes and wither skeletons
  # -------------------------------------------------------------------
  mcrpg:weekly_nether_conquest:
    display:
      name: "Nether Conquest"
      description: "Conquer the Nether's most dangerous denizens"
      objectives:
        weekly_slay_blazes: "Slay blazes"
        weekly_slay_wither_skeletons: "Slay wither skeletons"
      rewards:
        swords_xp: "Swords XP"
        blaze_rod_bonus: "Blaze Rods"
        wither_skull: "Wither Skeleton Skull"
    scope: mcrpg:single_player
    expiration: 7d
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:rare
        - mcrpg:epic
        - mcrpg:legendary
      supported-refresh-types:
        - WEEKLY
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: 20000
      blaze_rod_bonus:
        type: mcrpg:item
        item:
          material: BLAZE_ROD
        amount: 8
      wither_skull:
        type: mcrpg:item
        item:
          material: WITHER_SKELETON_SKULL
          amount: 1
    phases:
      nether_blaze:
        completion-mode: ALL
        stages:
          kill_blazes:
            key: mcrpg:weekly_conquest_kill_blazes
            objectives:
              slay_blazes:
                key: mcrpg:weekly_slay_blazes
                type: mcrpg:mob_kill
                required-progress: 40
                config:
                  mobs:
                    - BLAZE
      nether_wither:
        completion-mode: ALL
        stages:
          kill_wither_skeletons:
            key: mcrpg:weekly_conquest_kill_wither
            objectives:
              slay_wither_skeletons:
                key: mcrpg:weekly_slay_wither_skeletons
                type: mcrpg:mob_kill
                required-progress: 25
                config:
                  mobs:
                    - WITHER_SKELETON

  # -------------------------------------------------------------------
  # Medium: Kill overworld hostile mobs in bulk
  # -------------------------------------------------------------------
  mcrpg:weekly_overworld_purge:
    display:
      name: "Overworld Purge"
      description: "Purge hostile mobs across the overworld"
      objectives:
        weekly_slay_overworld_hostiles: "Slay overworld hostile mobs"
      rewards:
        swords_xp: "Swords XP"
        xp_bottle_bonus: "Experience Bottles"
    scope: mcrpg:single_player
    expiration: 7d
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:uncommon
        - mcrpg:rare
        - mcrpg:epic
      supported-refresh-types:
        - WEEKLY
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: 10000
      xp_bottle_bonus:
        type: mcrpg:item
        item:
          material: EXPERIENCE_BOTTLE
        amount: 16
    phases:
      purge:
        completion-mode: ALL
        stages:
          kill_overworld:
            key: mcrpg:weekly_purge_kill_overworld
            objectives:
              slay_overworld_hostiles:
                key: mcrpg:weekly_slay_overworld_hostiles
                type: mcrpg:mob_kill
                required-progress: 150
                config:
                  mobs:
                    - ZOMBIE
                    - SKELETON
                    - SPIDER
                    - CREEPER
                    - WITCH
                    - ENDERMAN

  # -------------------------------------------------------------------
  # Hard: Vault contender — overworld + nether hostiles
  # -------------------------------------------------------------------
  mcrpg:weekly_vault_contender:
    display:
      name: "Vault Contender"
      description: "Prove your worth across overworld and Nether"
      objectives:
        weekly_vault_overworld: "Slay overworld hostile mobs"
        weekly_vault_nether: "Slay Nether hostile mobs"
      rewards:
        swords_xp: "Swords XP"
        trial_key: "Trial Key"
    scope: mcrpg:single_player
    expiration: 7d
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:epic
      supported-refresh-types:
        - WEEKLY
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: 20000
      trial_key:
        type: mcrpg:item
        item:
          material: TRIAL_KEY
          amount: 1
    phases:
      overworld:
        completion-mode: ALL
        stages:
          kill_overworld:
            key: mcrpg:weekly_vault_kill_overworld
            objectives:
              slay_overworld:
                key: mcrpg:weekly_vault_overworld
                type: mcrpg:mob_kill
                required-progress: 100
                config:
                  mobs:
                    - ZOMBIE
                    - SKELETON
                    - SPIDER
                    - CREEPER
                    - WITCH
                    - ENDERMAN
      nether:
        completion-mode: ALL
        stages:
          kill_nether:
            key: mcrpg:weekly_vault_kill_nether
            objectives:
              slay_nether:
                key: mcrpg:weekly_vault_nether
                type: mcrpg:mob_kill
                required-progress: 30
                config:
                  mobs:
                    - BLAZE
                    - PIGLIN_BRUTE
                    - WITHER_SKELETON

  # -------------------------------------------------------------------
  # Very Hard: Ominous contender — nether hostiles + endermen
  # -------------------------------------------------------------------
  mcrpg:weekly_ominous_contender:
    display:
      name: "Ominous Contender"
      description: "Face the most dangerous foes across dimensions"
      objectives:
        weekly_ominous_nether: "Slay Nether hostile mobs"
        weekly_ominous_endermen: "Slay endermen"
      rewards:
        swords_xp: "Swords XP"
        ominous_key: "Ominous Trial Key"
    scope: mcrpg:single_player
    expiration: 7d
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:epic
        - mcrpg:legendary
      supported-refresh-types:
