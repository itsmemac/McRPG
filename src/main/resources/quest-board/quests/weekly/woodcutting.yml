# Weekly woodcutting quests for the quest board.

quests:
  # -------------------------------------------------------------------
  # Medium: Large lumber contract
  # -------------------------------------------------------------------
  mcrpg:weekly_lumber_contract:
    display:
      name: "Lumber Contract"
      description: "Fulfill a large lumber order"
      objectives:
        weekly_chop_mixed_logs: "Chop mixed logs"
      rewards:
        woodcutting_xp: "Woodcutting XP"
        plank_bonus: "Oak Planks"
    scope: mcrpg:single_player
    expiration: 7d
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:uncommon
        - mcrpg:rare
        - mcrpg:epic
      supported-refresh-types:
        - WEEKLY
    rewards:
      woodcutting_xp:
        type: mcrpg:experience
        skill: WOODCUTTING
        amount: 8000
      plank_bonus:
        type: mcrpg:item
        item:
          material: OAK_PLANKS
        amount: 64
    phases:
      chop:
        completion-mode: ALL
        stages:
          chop_logs:
            key: mcrpg:weekly_chop_mixed_logs
            objectives:
              chop_mixed_logs:
                key: mcrpg:weekly_chop_mixed_logs
                type: mcrpg:block_break
                required-progress: 256
                config:
                  blocks:
                    - OAK_LOG
                    - BIRCH_LOG
                    - SPRUCE_LOG
                    - JUNGLE_LOG
                    - DARK_OAK_LOG
                    - ACACIA_LOG
