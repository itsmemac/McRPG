# Weekly mining quests for the quest board.

quests:
  # -------------------------------------------------------------------
  # Very Hard: Mine ancient debris and diamond ore
  # -------------------------------------------------------------------
  mcrpg:weekly_deep_dive:
    display:
      name: "Deep Dive"
      description: "Venture deep for ancient debris and diamonds"
      objectives:
        weekly_break_ancient_debris: "Mine ancient debris"
        weekly_break_diamonds: "Mine diamond ore"
      rewards:
        mining_xp: "Mining XP"
        netherite_scrap: "Netherite Scrap"
    scope: mcrpg:single_player
    expiration: 7d
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:epic
        - mcrpg:legendary
      supported-refresh-types:
        - WEEKLY
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: 35000
      netherite_scrap:
        type: mcrpg:item
        item:
          material: NETHERITE_SCRAP
          amount: 1
    phases:
      debris:
        completion-mode: ALL
        stages:
          mine_debris:
            key: mcrpg:weekly_deep_mine_debris
            objectives:
              break_ancient_debris:
                key: mcrpg:weekly_break_ancient_debris
                type: mcrpg:block_break
                required-progress: 16
                config:
                  blocks:
                    - ANCIENT_DEBRIS
      diamonds:
        completion-mode: ALL
        stages:
          mine_diamonds:
            key: mcrpg:weekly_deep_mine_diamonds
            objectives:
              break_diamonds:
                key: mcrpg:weekly_break_diamonds
                type: mcrpg:block_break
                required-progress: 32
                config:
                  blocks:
                    - DIAMOND_ORE
                    - DEEPSLATE_DIAMOND_ORE
