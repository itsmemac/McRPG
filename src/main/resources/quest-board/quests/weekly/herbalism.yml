# Weekly herbalism quests for the quest board.

quests:
  # -------------------------------------------------------------------
  # Medium: Harvest festival — mass crop harvesting
  # -------------------------------------------------------------------
  mcrpg:weekly_harvest_festival:
    display:
      name: "Harvest Festival"
      description: "Bring in a massive crop harvest"
      objectives:
        weekly_break_mixed_crops: "Harvest mixed crops"
      rewards:
        herbalism_xp: "Herbalism XP"
        bread_bonus: "Bread"
    scope: mcrpg:single_player
    expiration: 7d
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:uncommon
        - mcrpg:rare
        - mcrpg:epic
      supported-refresh-types:
        - WEEKLY
    rewards:
      herbalism_xp:
        type: mcrpg:experience
        skill: HERBALISM
        amount: 8000
      bread_bonus:
        type: mcrpg:item
        item:
          material: BREAD
        amount: 16
    phases:
      harvest:
        completion-mode: ALL
        stages:
          harvest_crops:
            key: mcrpg:weekly_harvest_mixed_crops
            objectives:
              break_mixed_crops:
                key: mcrpg:weekly_break_mixed_crops
                type: mcrpg:block_break
                required-progress: 200
                config:
                  blocks:
                    - WHEAT
                    - CARROTS
                    - POTATOES
                    - BEETROOTS
                    - MELON
                    - PUMPKIN
