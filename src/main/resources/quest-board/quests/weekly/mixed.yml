# Weekly mixed-skill quests for the quest board.

quests:
  # -------------------------------------------------------------------
  # Medium: Mine stone and kill mobs
  # -------------------------------------------------------------------
  mcrpg:weekly_all_rounder:
    display:
      name: "All-Rounder"
      description: "Test your skills across mining and combat"
      objectives:
        weekly_all_rounder_mine_stone: "Mine stone blocks"
        weekly_all_rounder_slay_mobs: "Slay hostile mobs"
      rewards:
        mining_xp: "Mining XP"
        swords_xp: "Swords XP"
    scope: mcrpg:single_player
    expiration: 7d
    board-metadata:
      board-eligible: true
      supported-rarities:
        - mcrpg:uncommon
        - mcrpg:rare
      supported-refresh-types:
        - WEEKLY
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: 4000
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: 4000
    phases:
      mining:
        completion-mode: ALL
        stages:
          mine_stone:
            key: mcrpg:weekly_all_rounder_mine_stone
            objectives:
              break_stone:
                key: mcrpg:weekly_all_rounder_mine_stone
                type: mcrpg:block_break
                required-progress: 128
                config:
                  blocks:
                    - STONE
                    - COBBLESTONE
                    - ANDESITE
                    - DIORITE
                    - GRANITE
      combat:
        completion-mode: ALL
        stages:
          kill_mobs:
            key: mcrpg:weekly_all_rounder_kill_mobs
            objectives:
              slay_mobs:
                key: mcrpg:weekly_all_rounder_slay_mobs
                type: mcrpg:mob_kill
                required-progress: 60
                config:
                  mobs:
                    - ZOMBIE
                    - SKELETON
                    - SPIDER
                    - CREEPER
