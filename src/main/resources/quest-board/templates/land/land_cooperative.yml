          material: DIAMOND
        amount: 5

  # -------------------------------------------------------------------
  # Land Weekly Crusade — large-scale cooperative combat
  # -------------------------------------------------------------------
  mcrpg:template_land_weekly_crusade:
    display:
      name: "Land Weekly Crusade"
      description: "Unite your land for a week-long monster crusade"
    display-name-route: quest-templates.land-weekly-crusade
    board-eligible: true
    scope: mcrpg:land_scope
    supported-rarities:
      - mcrpg:rare
      - mcrpg:epic
      - mcrpg:legendary
    variables:
      target_mobs:
        type: POOL
        min-selections: 1
        max-selections: 3
        pools:
          overworld_easy:
