# Land-scoped cooperative quest templates — quests that all members
# of a Lands territory can contribute to together.
#
# VARIABLE NAMES use underscores (not hyphens) — the expression parser
# treats '-' as subtraction.
#
# RANGE variables are scaled by: pool difficulty * rarity difficulty-multiplier.

quest-templates:
  # -------------------------------------------------------------------
  # Land Mining Effort — cooperative ore gathering
  # -------------------------------------------------------------------
  mcrpg:template_land_mining_effort:
    display:
      name: "Land Mining Effort"
      description: "Rally your land to mine together"
    display-name-route: quest-templates.land-mining-effort
    board-eligible: true
    scope: mcrpg:land_scope
    supported-rarities:
      - mcrpg:common
      - mcrpg:uncommon
      - mcrpg:rare
      - mcrpg:epic
    variables:
      target_blocks:
        type: POOL
        min-selections: 1
        max-selections: 3
        pools:
          basic_stone:
            difficulty: 1.0
            weight:
              mcrpg:common: 80
              mcrpg:uncommon: 40
              mcrpg:rare: 10
              mcrpg:epic: 5
            values:
              - STONE
              - COBBLESTONE
              - ANDESITE
              - DIORITE
              - GRANITE
          ores:
            difficulty: 2.0
            weight:
              mcrpg:common: 10
              mcrpg:uncommon: 50
              mcrpg:rare: 70
              mcrpg:epic: 60
            values:
              - COAL_ORE
              - IRON_ORE
              - COPPER_ORE
              - DEEPSLATE_COAL_ORE
              - DEEPSLATE_IRON_ORE
              - DEEPSLATE_COPPER_ORE
          rare_ores:
            difficulty: 4.0
            weight:
              mcrpg:common: 0
              mcrpg:uncommon: 10
              mcrpg:rare: 40
              mcrpg:epic: 35
            values:
              - GOLD_ORE
              - DEEPSLATE_GOLD_ORE
              - LAPIS_ORE
              - DEEPSLATE_LAPIS_ORE
              - REDSTONE_ORE
              - DEEPSLATE_REDSTONE_ORE
      block_count:
        type: RANGE
        base:
          min: 96
          max: 256
    phases:
      cooperative_mining:
        completion-mode: ALL
        stages:
          mine_targets:
            objectives:
              break_blocks:
                type: mcrpg:block_break
                required-progress: block_count
                config:
                  blocks: target_blocks
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: block_count * 10
      iron_ingots:
        type: mcrpg:item
        item:
          material: IRON_INGOT
        amount: 8

  # -------------------------------------------------------------------
  # Land Defense — cooperative mob slaying
  # -------------------------------------------------------------------
  mcrpg:template_land_defense:
    display:
      name: "Land Defense"
      description: "Defend your land from hostile creatures"
    display-name-route: quest-templates.land-defense
    board-eligible: true
    scope: mcrpg:land_scope
    supported-rarities:
      - mcrpg:common
      - mcrpg:uncommon
      - mcrpg:rare
      - mcrpg:epic
    variables:
      target_mobs:
        type: POOL
        min-selections: 1
        max-selections: 3
        pools:
          overworld_easy:
            difficulty: 1.0
            weight:
              mcrpg:common: 75
              mcrpg:uncommon: 45
              mcrpg:rare: 15
              mcrpg:epic: 5
            values:
              - ZOMBIE
              - SKELETON
              - SPIDER
              - CREEPER
          overworld_medium:
            difficulty: 1.5
            weight:
              mcrpg:common: 20
              mcrpg:uncommon: 40
              mcrpg:rare: 50
              mcrpg:epic: 40
            values:
              - HUSK
              - STRAY
              - DROWNED
              - CAVE_SPIDER
              - WITCH
          overworld_hard:
            difficulty: 2.5
            weight:
              mcrpg:common: 0
              mcrpg:uncommon: 10
              mcrpg:rare: 35
              mcrpg:epic: 55
            values:
              - VINDICATOR
              - RAVAGER
              - EVOKER
      kill_count:
        type: RANGE
        base:
          min: 40
          max: 100
    phases:
      defense:
        completion-mode: ALL
        stages:
          slay_invaders:
            objectives:
              kill_mobs:
                type: mcrpg:mob_kill
                required-progress: kill_count
                config:
                  mobs: target_mobs
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: kill_count * 25
      xp_bottles:
        type: mcrpg:item
        item:
          material: EXPERIENCE_BOTTLE
        amount: 4

  # -------------------------------------------------------------------
  # Land Resource Drive — ANY mode: mine OR chop OR harvest
  # -------------------------------------------------------------------
  mcrpg:template_land_resource_drive:
    display:
      name: "Land Resource Drive"
      description: "Gather resources for your land — choose your specialty"
    display-name-route: quest-templates.land-resource-drive
    board-eligible: true
    scope: mcrpg:land_scope
    supported-rarities:
      - mcrpg:common
      - mcrpg:uncommon
      - mcrpg:rare
    variables:
      resource_count:
        type: RANGE
        base:
          min: 64
          max: 192
    phases:
      resource_gathering:
        completion-mode: ANY
        stages:
          mining_path:
            objectives:
              mine_ores:
                type: mcrpg:block_break
                required-progress: resource_count
                config:
                  blocks:
                    - IRON_ORE
                    - DEEPSLATE_IRON_ORE
                    - COAL_ORE
                    - DEEPSLATE_COAL_ORE
                    - COPPER_ORE
                    - DEEPSLATE_COPPER_ORE
          woodcutting_path:
            objectives:
              chop_logs:
                type: mcrpg:block_break
                required-progress: resource_count
                config:
                  blocks:
                    - OAK_LOG
                    - BIRCH_LOG
                    - SPRUCE_LOG
                    - JUNGLE_LOG
                    - DARK_OAK_LOG
                    - ACACIA_LOG
          herbalism_path:
            objectives:
              harvest_crops:
                type: mcrpg:block_break
                required-progress: resource_count
                config:
                  blocks:
                    - WHEAT
                    - POTATOES
                    - CARROTS
                    - BEETROOTS
                    - MELON
                    - PUMPKIN
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: 1500
      woodcutting_xp:
        type: mcrpg:experience
        skill: WOODCUTTING
        amount: 1500
      herbalism_xp:
        type: mcrpg:experience
        skill: HERBALISM
        amount: 1500

  # -------------------------------------------------------------------
  # Land Weekly Excavation — large-scale cooperative mining
  # -------------------------------------------------------------------
  mcrpg:template_land_weekly_excavation:
