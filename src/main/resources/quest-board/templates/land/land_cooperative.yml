      kill_count:
        type: RANGE
        base:
          min: 100
          max: 300
    phases:
      crusade:
        completion-mode: ALL
        stages:
          slay_targets:
            objectives:
              kill_mobs:
                type: mcrpg:mob_kill
                required-progress: kill_count
                config:
                  mobs: target_mobs
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: kill_count * 30
      enchanted_sword:
        type: mcrpg:item
        item:
          material: DIAMOND_SWORD
          enchantments:
            SHARPNESS: 3
            UNBREAKING: 2
          name: "<yellow>Crusader's Blade"
