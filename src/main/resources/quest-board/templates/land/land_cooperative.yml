        max-selections: 3
        pools:
          basic_stone:
            difficulty: 1.0
            weight:
              mcrpg:rare: 15
              mcrpg:epic: 5
              mcrpg:legendary: 0
            values:
              - STONE
              - COBBLESTONE
              - ANDESITE
              - DIORITE
              - GRANITE
          ores:
            difficulty: 2.0
            weight:
              mcrpg:rare: 60
              mcrpg:epic: 55
              mcrpg:legendary: 20
            values:
              - COAL_ORE
              - IRON_ORE
              - COPPER_ORE
              - DEEPSLATE_COAL_ORE
              - DEEPSLATE_IRON_ORE
              - DEEPSLATE_COPPER_ORE
          rare_ores:
            difficulty: 4.0
            weight:
              mcrpg:rare: 25
              mcrpg:epic: 40
              mcrpg:legendary: 80
            values:
              - GOLD_ORE
              - DEEPSLATE_GOLD_ORE
              - LAPIS_ORE
              - DEEPSLATE_LAPIS_ORE
              - REDSTONE_ORE
              - DEEPSLATE_REDSTONE_ORE
      block_count:
        type: RANGE
        base:
          min: 256
          max: 768
    phases:
      excavation:
        completion-mode: ALL
        stages:
          mine_targets:
            objectives:
              break_blocks:
                type: mcrpg:block_break
                required-progress: block_count
                config:
                  blocks: target_blocks
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: block_count * 12
      diamonds:
        type: mcrpg:item
