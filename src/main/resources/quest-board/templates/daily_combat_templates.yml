# Template-generated combat quests.
#
# -----------------------------------------------------------------------
# TEMPLATE AUTHORING GUIDE
# -----------------------------------------------------------------------
#
# VARIABLE NAMES
#   Declare variables under the 'variables' key. Variable names must use
#   underscores (not hyphens) because the expression parser treats '-' as
#   subtraction. Example: kill_count, not kill-count.
#
# EXPRESSION SYNTAX (required-progress and reward amount fields)
#   Use bare variable names directly in expressions. Do NOT wrap them in
#   curly braces or quotes — just write the variable name:
#     required-progress: kill_count
#     amount: kill_count * 10
#   Supported operators: +  -  *  /  ^  %  ( )
#   Results are rounded to the nearest whole number.
#
# VARIABLE SUBSTITUTION IN CONFIG BLOCKS
#   To substitute a pool variable (e.g. a list of mob types) into an
#   objective config, write the bare variable name as the value with no
#   quotes and no braces:
#     config:
#       mobs: target_mobs     <- correct
#       mobs: "{target_mobs}" <- WRONG — breaks substitution
#
# RANGE VARIABLE SCALING
#   RANGE variables are scaled by: pool difficulty * rarity difficulty-multiplier.
#   Higher rarity = larger difficulty multiplier = higher counts.
#
# VALID SKILL VALUES (for mcrpg:experience rewards)
#   MINING, SWORDS, WOODCUTTING, HERBALISM
#   (Plus any skills registered by third-party expansions.)
#
# -----------------------------------------------------------------------

quest-templates:
  # -------------------------------------------------------------------
  # Mob slayer — target mob pool varies by rarity
  # -------------------------------------------------------------------
  mcrpg:template_mob_slayer:
    display:
      name: "Mob Slayer"
      description: "Hunt down hostile mobs"
    display-name-route: quest-templates.mob-slayer
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:common
      - mcrpg:uncommon
      - mcrpg:rare
      - mcrpg:legendary
    variables:
      target_mobs:
        type: POOL
        min-selections: 1
        max-selections: 3
        pools:
          overworld_easy:
            difficulty: 1.0
            weight:
              mcrpg:common: 80
              mcrpg:uncommon: 40
              mcrpg:rare: 10
              mcrpg:legendary: 0
            values:
              - ZOMBIE
              - SKELETON
              - SPIDER
              - CREEPER
          overworld_medium:
            difficulty: 1.5
            weight:
              mcrpg:common: 15
              mcrpg:uncommon: 40
              mcrpg:rare: 30
              mcrpg:legendary: 10
            values:
              - HUSK
              - STRAY
              - DROWNED
              - CAVE_SPIDER
              - WITCH
          nether_mobs:
            difficulty: 2.5
            weight:
              mcrpg:common: 0
              mcrpg:uncommon: 10
              mcrpg:rare: 40
              mcrpg:legendary: 50
            values:
              - BLAZE
              - PIGLIN_BRUTE
              - WITHER_SKELETON
              - HOGLIN
          end_mobs:
            difficulty: 3.0
            weight:
              mcrpg:common: 0
              mcrpg:uncommon: 0
              mcrpg:rare: 15
              mcrpg:legendary: 40
            values:
              - ENDERMAN
              - SHULKER
      kill_count:
        type: RANGE
        base:
          min: 10
          max: 40
    phases:
      hunt:
        completion-mode: ALL
        stages:
          slay_targets:
            objectives:
              kill_mobs:
                type: mcrpg:mob_kill
                required-progress: kill_count
                config:
                  mobs: target_mobs
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: kill_count * 10

  # -------------------------------------------------------------------
  # Undead purge — multi-stage kill quest
  # -------------------------------------------------------------------
  mcrpg:template_undead_purge:
    display:
      name: "Undead Purge"
      description: "Eliminate zombies and skeletons"
    display-name-route: quest-templates.undead-purge
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:common
      - mcrpg:uncommon
      - mcrpg:rare
    variables:
      zombie_count:
        type: RANGE
        base:
          min: 15
          max: 40
      skeleton_count:
        type: RANGE
        base:
          min: 10
          max: 30
    phases:
      purge_undead:
        completion-mode: ALL
        stages:
          kill_zombies:
            objectives:
              slay_zombies:
                type: mcrpg:mob_kill
                required-progress: zombie_count
                config:
                  mobs:
                    - ZOMBIE
                    - HUSK
                    - DROWNED
          kill_skeletons:
            objectives:
              slay_skeletons:
                type: mcrpg:mob_kill
                required-progress: skeleton_count
                config:
                  mobs:
                    - SKELETON
                    - STRAY
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: (zombie_count + skeleton_count) * 8
