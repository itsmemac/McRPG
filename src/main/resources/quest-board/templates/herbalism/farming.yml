# Herbalism quest templates — crop harvesting and botanical collecting.
#
# VARIABLE NAMES use underscores (not hyphens) — the expression parser
# treats '-' as subtraction.
#
# RANGE variables are scaled by: pool difficulty * rarity difficulty-multiplier.

quest-templates:
  # -------------------------------------------------------------------
  # Crop Harvester — pool-based farming
  # -------------------------------------------------------------------
  mcrpg:template_crop_harvester:
    display:
      name: "Crop Harvester"
      description: "Harvest crops from your farms"
    display-name-route: quest-templates.crop-harvester
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:common
      - mcrpg:uncommon
      - mcrpg:rare
      - mcrpg:epic
    variables:
      target_crops:
        type: POOL
        min-selections: 1
        max-selections: 3
        pools:
          basic_crops:
            difficulty: 1.0
            weight:
              mcrpg:common: 70
              mcrpg:uncommon: 45
              mcrpg:rare: 15
              mcrpg:epic: 5
            values:
              - WHEAT
              - POTATOES
              - CARROTS
          advanced_crops:
            difficulty: 1.5
            weight:
              mcrpg:common: 25
              mcrpg:uncommon: 40
              mcrpg:rare: 50
              mcrpg:epic: 35
            values:
              - BEETROOTS
              - MELON
              - PUMPKIN
          exotic_crops:
            difficulty: 2.5
            weight:
              mcrpg:common: 0
              mcrpg:uncommon: 10
              mcrpg:rare: 35
              mcrpg:epic: 60
            values:
              - NETHER_WART
              - COCOA
              - SWEET_BERRY_BUSH
      crop_count:
        type: RANGE
        base:
          min: 32
          max: 96
    phases:
      harvest:
        completion-mode: ALL
        stages:
          harvest_crops:
            objectives:
              break_crops:
                type: mcrpg:block_break
                required-progress: crop_count
                config:
                  blocks: target_crops
    rewards:
      herbalism_xp:
        type: mcrpg:experience
        skill: HERBALISM
        amount: crop_count * 20

  # -------------------------------------------------------------------
  # Botanical Collector — rare plant and fungi gathering
  # -------------------------------------------------------------------
  mcrpg:template_botanical_collector:
    display:
      name: "Botanical Collector"
      description: "Gather rare plants, fungi, and exotic flora"
    display-name-route: quest-templates.botanical-collector
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:rare
      - mcrpg:epic
      - mcrpg:legendary
    variables:
      target_plants:
        type: POOL
        min-selections: 1
        max-selections: 2
        pools:
          flowers:
            difficulty: 1.0
            weight:
              mcrpg:rare: 60
              mcrpg:epic: 25
              mcrpg:legendary: 5
            values:
              - DANDELION
              - POPPY
              - BLUE_ORCHID
              - ALLIUM
              - AZURE_BLUET
          fungi:
            difficulty: 2.0
            weight:
              mcrpg:rare: 30
              mcrpg:epic: 50
              mcrpg:legendary: 25
            values:
              - RED_MUSHROOM_BLOCK
              - BROWN_MUSHROOM_BLOCK
              - SHROOMLIGHT
          special:
            difficulty: 3.5
            weight:
              mcrpg:rare: 10
              mcrpg:epic: 25
              mcrpg:legendary: 70
            values:
              - CHORUS_PLANT
              - CHORUS_FLOWER
              - SCULK
      plant_count:
        type: RANGE
        base:
          min: 16
          max: 48
    phases:
      collect:
        completion-mode: ALL
        stages:
          gather_plants:
            objectives:
              break_plants:
                type: mcrpg:block_break
                required-progress: plant_count
                config:
                  blocks: target_plants
    rewards:
      herbalism_xp:
        type: mcrpg:experience
        skill: HERBALISM
        amount: plant_count * 40
      bone_meal:
        type: mcrpg:item
        item:
          material: BONE_MEAL
        amount: 8
