# Nether and trial combat templates.
#
# VARIABLE NAMES use underscores (not hyphens) — the expression parser
# treats '-' as subtraction.
#
# RANGE variables are scaled by: pool difficulty * rarity difficulty-multiplier.

quest-templates:
  # -------------------------------------------------------------------
  # Nether Warrior — battle the fiery denizens of the Nether
  # -------------------------------------------------------------------
  mcrpg:template_nether_warrior:
    display:
      name: "Nether Warrior"
      description: "Battle the fiery denizens of the Nether"
    display-name-route: quest-templates.nether-warrior
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:uncommon
      - mcrpg:rare
      - mcrpg:epic
      - mcrpg:legendary
    variables:
      target_mobs:
        type: POOL
        min-selections: 1
        max-selections: 2
        pools:
          nether_common:
            difficulty: 1.5
            weight:
              mcrpg:uncommon: 60
              mcrpg:rare: 30
              mcrpg:epic: 10
              mcrpg:legendary: 0
            values:
              - ZOMBIFIED_PIGLIN
              - MAGMA_CUBE
          nether_hard:
            difficulty: 2.5
            weight:
              mcrpg:uncommon: 30
              mcrpg:rare: 50
              mcrpg:epic: 40
              mcrpg:legendary: 20
            values:
              - BLAZE
              - PIGLIN_BRUTE
              - HOGLIN
          nether_elite:
            difficulty: 4.0
            weight:
              mcrpg:uncommon: 5
              mcrpg:rare: 20
              mcrpg:epic: 50
              mcrpg:legendary: 80
            values:
              - WITHER_SKELETON
              - GHAST
      kill_count:
        type: RANGE
        base:
          min: 10
          max: 30
    phases:
      nether_hunt:
        completion-mode: ALL
        stages:
          slay_nether:
            objectives:
              kill_nether_mobs:
                type: mcrpg:mob_kill
                required-progress: kill_count
                config:
                  mobs: target_mobs
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: kill_count * 80
      blaze_rods:
        type: mcrpg:item
        item:
          material: BLAZE_ROD
        amount: 2
      ghast_tear:
        type: mcrpg:item
        condition:
          rarity-at-least: mcrpg:rare
        item:
          material: GHAST_TEAR
        amount: 1
      wither_skull:
        type: mcrpg:item
        condition:
          rarity-at-least: mcrpg:epic
        item:
          material: WITHER_SKELETON_SKULL
          amount: 1

  # -------------------------------------------------------------------
  # Trial Contender — general combat with trial rewards
  # -------------------------------------------------------------------
  mcrpg:template_trial_contender:
    display:
      name: "Trial Contender"
      description: "Prove your combat prowess across dimensions"
    display-name-route: quest-templates.trial-contender
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:rare
      - mcrpg:epic
      - mcrpg:legendary
    variables:
      target_mobs:
        type: POOL
        min-selections: 1
        max-selections: 2
        pools:
          overworld_common:
            difficulty: 1.0
            weight:
              mcrpg:rare: 60
              mcrpg:epic: 30
              mcrpg:legendary: 10
            values:
              - ZOMBIE
              - SKELETON
              - SPIDER
              - CREEPER
          overworld_hard:
            difficulty: 2.0
            weight:
              mcrpg:rare: 30
              mcrpg:epic: 50
              mcrpg:legendary: 30
            values:
              - WITCH
              - VINDICATOR
              - RAVAGER
          nether_mixed:
            difficulty: 3.0
            weight:
              mcrpg:rare: 10
              mcrpg:epic: 20
              mcrpg:legendary: 60
            values:
              - BLAZE
              - PIGLIN_BRUTE
              - WITHER_SKELETON
      kill_count:
        type: RANGE
        base:
          min: 15
          max: 40
    phases:
      trial:
        completion-mode: ALL
        stages:
          combat_trial:
            objectives:
              slay_targets:
                type: mcrpg:mob_kill
                required-progress: kill_count
                config:
                  mobs: target_mobs
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: kill_count * 80
      wind_charges:
        type: mcrpg:item
        item:
          material: WIND_CHARGE
        amount: 2
      trial_key:
        type: mcrpg:item
        condition:
          rarity-at-least: mcrpg:epic
        item:
          material: TRIAL_KEY
          amount: 1
