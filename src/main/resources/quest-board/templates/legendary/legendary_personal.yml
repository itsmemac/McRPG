# Legendary personal quest templates — exclusive endgame quests gated
# behind prerequisite completion counts with unique item rewards.
#
# VARIABLE NAMES use underscores (not hyphens) — the expression parser
# treats '-' as subtraction.
#
# RANGE variables are scaled by: pool difficulty * rarity difficulty-multiplier.

quest-templates:
  # -------------------------------------------------------------------
  # Legendary Master Prospector — elite mining challenge
  # -------------------------------------------------------------------
  mcrpg:template_legendary_master_prospector:
    display:
      name: "Master Prospector"
      description: "Mine the rarest ores in the world"
    display-name-route: quest-templates.legendary-master-prospector
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:legendary
    prerequisite:
      min-completions: 15
    variables:
      ancient_debris_count:
        type: RANGE
        base:
          min: 8
          max: 16
      diamond_ore_count:
        type: RANGE
        base:
          min: 16
          max: 32
      emerald_ore_count:
        type: RANGE
        base:
          min: 8
          max: 16
    phases:
      prospecting:
        completion-mode: ALL
        stages:
          mine_ancient_debris:
            objectives:
              break_ancient_debris:
                type: mcrpg:block_break
                required-progress: ancient_debris_count
                config:
                  blocks:
                    - ANCIENT_DEBRIS
          mine_diamonds:
            objectives:
              break_diamond_ore:
                type: mcrpg:block_break
                required-progress: diamond_ore_count
                config:
                  blocks:
                    - DIAMOND_ORE
                    - DEEPSLATE_DIAMOND_ORE
          mine_emeralds:
            objectives:
              break_emerald_ore:
                type: mcrpg:block_break
                required-progress: emerald_ore_count
                config:
                  blocks:
                    - EMERALD_ORE
                    - DEEPSLATE_EMERALD_ORE
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: 3000
      legendary_pickaxe:
        type: mcrpg:item
        item:
          material: DIAMOND_PICKAXE
          enchantments:
            EFFICIENCY: 4
            FORTUNE: 3
            UNBREAKING: 3
          name: "<gold>Legendary Prospector's Pick"
          lore:
            - "<gray>Forged in the depths of the world"
            - "<dark_purple>Awarded to a Master Prospector"
          settings:
            glowing: true
          amount: 1

  # -------------------------------------------------------------------
  # Legendary Apex Predator — 3-phase elite combat
  # -------------------------------------------------------------------
  mcrpg:template_legendary_apex_predator:
    display:
      name: "Apex Predator"
      description: "Become the ultimate hunter across dimensions"
    display-name-route: quest-templates.legendary-apex-predator
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:legendary
    prerequisite:
      min-completions: 15
    variables:
      enderman_count:
        type: RANGE
        base:
          min: 20
          max: 40
      blaze_count:
        type: RANGE
        base:
          min: 15
          max: 30
      wither_skeleton_count:
        type: RANGE
        base:
          min: 10
          max: 20
    phases:
      end_hunt:
        completion-mode: ALL
        stages:
          slay_endermen:
            objectives:
              kill_endermen:
                type: mcrpg:mob_kill
                required-progress: enderman_count
                config:
                  mobs:
                    - ENDERMAN
      nether_hunt:
        completion-mode: ALL
        stages:
          slay_blazes:
            objectives:
              kill_blazes:
                type: mcrpg:mob_kill
                required-progress: blaze_count
                config:
                  mobs:
                    - BLAZE
      fortress_hunt:
        completion-mode: ALL
        stages:
          slay_wither_skeletons:
            objectives:
              kill_wither_skeletons:
                type: mcrpg:mob_kill
                required-progress: wither_skeleton_count
                config:
                  mobs:
                    - WITHER_SKELETON
    rewards:
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: 3000
      legendary_sword:
        type: mcrpg:item
        item:
          material: DIAMOND_SWORD
          enchantments:
            SHARPNESS: 4
            LOOTING: 3
            UNBREAKING: 3
          name: "<gold>Apex Predator's Blade"
          lore:
            - "<gray>Tempered by the blood of a thousand foes"
            - "<dark_purple>Awarded to an Apex Predator"
          settings:
            glowing: true
          amount: 1

  # -------------------------------------------------------------------
  # Legendary Jack of All Trades — 4-phase multi-skill gauntlet
  # -------------------------------------------------------------------
  mcrpg:template_legendary_jack_of_all_trades:
    display:
      name: "Jack of All Trades"
      description: "Master every discipline in a single epic quest"
    display-name-route: quest-templates.legendary-jack-of-all-trades
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:legendary
    prerequisite:
      min-completions: 20
    variables:
      block_count:
        type: RANGE
        base:
          min: 128
          max: 256
      mob_count:
        type: RANGE
        base:
          min: 40
          max: 80
      log_count:
        type: RANGE
        base:
          min: 64
          max: 128
      crop_count:
        type: RANGE
        base:
          min: 48
          max: 96
    phases:
      mining_phase:
        completion-mode: ALL
        stages:
          mine_blocks:
            objectives:
              break_blocks:
                type: mcrpg:block_break
                required-progress: block_count
                config:
                  blocks:
                    - STONE
                    - IRON_ORE
                    - DEEPSLATE_IRON_ORE
                    - GOLD_ORE
                    - DEEPSLATE_GOLD_ORE
                    - DIAMOND_ORE
                    - DEEPSLATE_DIAMOND_ORE
      combat_phase:
        completion-mode: ALL
        stages:
          slay_mobs:
            objectives:
              kill_mobs:
                type: mcrpg:mob_kill
                required-progress: mob_count
                config:
                  mobs:
                    - ZOMBIE
                    - SKELETON
                    - CREEPER
                    - SPIDER
                    - BLAZE
                    - ENDERMAN
                    - WITHER_SKELETON
      woodcutting_phase:
        completion-mode: ALL
        stages:
          chop_logs:
            objectives:
              break_logs:
                type: mcrpg:block_break
                required-progress: log_count
                config:
                  blocks:
                    - OAK_LOG
                    - BIRCH_LOG
                    - SPRUCE_LOG
                    - JUNGLE_LOG
                    - DARK_OAK_LOG
                    - ACACIA_LOG
      herbalism_phase:
        completion-mode: ALL
        stages:
          harvest_crops:
            objectives:
              break_crops:
                type: mcrpg:block_break
                required-progress: crop_count
                config:
                  blocks:
                    - WHEAT
                    - POTATOES
                    - CARROTS
                    - BEETROOTS
                    - MELON
                    - PUMPKIN
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: 2000
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: 2000
      woodcutting_xp:
        type: mcrpg:experience
        skill: WOODCUTTING
        amount: 2000
      herbalism_xp:
        type: mcrpg:experience
        skill: HERBALISM
        amount: 2000
      netherite_scrap:
        type: mcrpg:item
        item:
          material: NETHERITE_SCRAP
        amount: 2
      legendary_chestplate:
        type: mcrpg:item
        item:
          material: DIAMOND_CHESTPLATE
          enchantments:
            PROTECTION: 4
            UNBREAKING: 3
          name: "<gold>Jack's Resilient Plate"
          lore:
            - "<gray>Worn by those who mastered every craft"
            - "<dark_purple>Awarded to a Jack of All Trades"
          settings:
            glowing: true
          amount: 1
