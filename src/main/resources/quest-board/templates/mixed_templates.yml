# Mixed/multi-phase templates showcasing advanced features.
#
# -----------------------------------------------------------------------
# TEMPLATE AUTHORING GUIDE
# -----------------------------------------------------------------------
#
# VARIABLE NAMES
#   Declare variables under the 'variables' key. Variable names must use
#   underscores (not hyphens) because the expression parser treats '-' as
#   subtraction. Example: block_count, not block-count.
#
# EXPRESSION SYNTAX (required-progress and reward amount fields)
#   Use bare variable names directly in expressions. Do NOT wrap them in
#   curly braces or quotes — just write the variable name:
#     required-progress: block_count
#     amount: block_count * 4
#   Supported operators: +  -  *  /  ^  %  ( )
#   Results are rounded to the nearest whole number.
#
# VARIABLE SUBSTITUTION IN CONFIG BLOCKS
#   To substitute a pool variable (e.g. a list of block/mob types) into an
#   objective config, write the bare variable name as the value with no
#   quotes and no braces:
#     config:
#       blocks: target_blocks     <- correct
#       blocks: "{target_blocks}" <- WRONG — breaks substitution
#
# RANGE VARIABLE SCALING
#   RANGE variables are scaled by: pool difficulty * rarity difficulty-multiplier.
#   Higher rarity = larger difficulty multiplier = higher counts.
#
# VALID SKILL VALUES (for mcrpg:experience rewards)
#   MINING, SWORDS, WOODCUTTING, HERBALISM
#   (Plus any skills registered by third-party expansions.)
#
# -----------------------------------------------------------------------

quest-templates:
  # -------------------------------------------------------------------
  # Two-phase quest: mine then fight
  # -------------------------------------------------------------------
  mcrpg:template_mine_and_fight:
    display:
      name: "Mine and Fight"
      description: "Gather ores then fight hostile mobs"
    display-name-route: quest-templates.mine-and-fight
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:uncommon
      - mcrpg:rare
      - mcrpg:legendary
    variables:
      block_count:
        type: RANGE
        base:
          min: 32
          max: 80
      mob_count:
        type: RANGE
        base:
          min: 10
          max: 30
    phases:
      mine_phase:
        completion-mode: ALL
        stages:
          gather_resources:
            objectives:
              mine_ores:
                type: mcrpg:block_break
                required-progress: block_count
                config:
                  blocks:
                    - IRON_ORE
                    - DEEPSLATE_IRON_ORE
                    - GOLD_ORE
                    - DEEPSLATE_GOLD_ORE
      fight_phase:
        completion-mode: ALL
        stages:
          fight_monsters:
            objectives:
              kill_hostiles:
                type: mcrpg:mob_kill
                required-progress: mob_count
                config:
                  mobs:
                    - ZOMBIE
                    - SKELETON
                    - CREEPER
                    - SPIDER
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: block_count * 4
      swords_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: mob_count * 8

  # -------------------------------------------------------------------
  # Branching template: choose your path (ANY completion)
  # -------------------------------------------------------------------
  mcrpg:template_choose_path:
    display:
      name: "Choose Your Path"
      description: "Pick mining or combat to complete this quest"
    display-name-route: quest-templates.choose-path
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:common
      - mcrpg:uncommon
      - mcrpg:rare
    variables:
      amount:
        type: RANGE
        base:
          min: 20
          max: 50
    phases:
      choose:
        completion-mode: ANY
        stages:
          mining_path:
            objectives:
              mine_coal:
                type: mcrpg:block_break
                required-progress: amount
                config:
                  blocks:
                    - COAL_ORE
                    - DEEPSLATE_COAL_ORE
          combat_path:
            objectives:
              kill_zombies:
                type: mcrpg:mob_kill
                required-progress: amount
                config:
                  mobs:
                    - ZOMBIE
                    - HUSK
    rewards:
      versatile_xp:
        type: mcrpg:experience
        skill: MINING
        amount: amount * 5

  # -------------------------------------------------------------------
  # Condition-gated template: bonus phase only for rare+
  # Uses Phase 4 condition system
  # -------------------------------------------------------------------
  mcrpg:template_lucky_strike:
    display:
      name: "Lucky Strike"
      description: "Mine iron ore, with a bonus diamond phase for rare+"
    display-name-route: quest-templates.lucky-strike
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:common
      - mcrpg:uncommon
      - mcrpg:rare
      - mcrpg:legendary
    variables:
      ore_count:
        type: RANGE
        base:
          min: 16
          max: 48
    phases:
      main_phase:
        completion-mode: ALL
        stages:
          mine_iron:
            objectives:
              break_iron:
                type: mcrpg:block_break
                required-progress: ore_count
                config:
                  blocks:
                    - IRON_ORE
                    - DEEPSLATE_IRON_ORE
      bonus_phase:
        # min-rarity accepts bare keys (rare) or namespaced keys (mcrpg:rare) — both are valid.
        condition:
          type: mcrpg:rarity_gate
          min-rarity: rare
        completion-mode: ALL
        stages:
          mine_diamonds:
            objectives:
              break_diamonds:
                type: mcrpg:block_break
                required-progress: 8
                config:
                  blocks:
                    - DIAMOND_ORE
                    - DEEPSLATE_DIAMOND_ORE
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: ore_count * 5
      bonus_reward:
        # base-amount is scaled by the rarity reward-multiplier at generation time.
        # {amount} in the command string is replaced with the scaled value when the reward is granted.
        # Commands run as console. Use {player} for the accepting player's name.
        type: mcrpg:scalable_command
        display: "Bonus Diamonds"
        command: "give {player} diamond {amount}"
        base-amount: 3
