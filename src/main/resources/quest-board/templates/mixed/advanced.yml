# Advanced templates — prerequisite gating, weighted objective selection,
# and reward fallbacks.
#
# VARIABLE NAMES use underscores (not hyphens) — the expression parser
# treats '-' as subtraction.
#
# RANGE variables are scaled by: pool difficulty * rarity difficulty-multiplier.

quest-templates:
  # -------------------------------------------------------------------
  # Prerequisite-gated template: requires 5+ completed quests to appear
  # -------------------------------------------------------------------
  mcrpg:template_veteran_miner:
    display:
      name: "Veteran Miner"
      description: "A challenging mining quest for experienced players"
    display-name-route: quest-templates.veteran-miner
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:rare
      - mcrpg:epic
      - mcrpg:legendary
    prerequisite:
      min-completions: 5
    variables:
      ore_count:
        type: RANGE
        base:
          min: 48
          max: 128
    phases:
      main:
        completion-mode: ALL
        stages:
          deep_mine:
            objectives:
              mine_deepslate:
                type: mcrpg:block_break
                required-progress: ore_count
                config:
                  blocks:
                    - DEEPSLATE_DIAMOND_ORE
                    - DEEPSLATE_EMERALD_ORE
                    - ANCIENT_DEBRIS
    rewards:
      mining_xp:
        type: mcrpg:experience
        skill: MINING
        amount: ore_count * 30

  # -------------------------------------------------------------------
  # Weighted objective selection: randomly selects 2 of 4 possible tasks
  # -------------------------------------------------------------------
  mcrpg:template_daily_variety:
    display:
      name: "Daily Variety"
      description: "Complete two randomly chosen tasks"
    display-name-route: quest-templates.daily-variety
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:common
      - mcrpg:uncommon
      - mcrpg:rare
      - mcrpg:epic
    variables:
      amount:
        type: RANGE
        base:
          min: 10
          max: 30
    phases:
      tasks:
        completion-mode: ALL
        stages:
          random_tasks:
            objective-selection:
              mode: WEIGHTED_RANDOM
              min-count: 2
              max-count: 2
            objectives:
              mine_stone:
                type: mcrpg:block_break
                weight: 30
                required-progress: amount
                config:
                  blocks:
                    - STONE
                    - DEEPSLATE
              mine_ores:
                type: mcrpg:block_break
                weight: 20
                required-progress: amount / 2
                config:
                  blocks:
                    - IRON_ORE
                    - COPPER_ORE
              kill_undead:
                type: mcrpg:mob_kill
                weight: 25
                required-progress: amount
                config:
                  mobs:
                    - ZOMBIE
                    - SKELETON
              kill_spiders:
                type: mcrpg:mob_kill
                weight: 25
                required-progress: amount
                config:
                  mobs:
                    - SPIDER
                    - CAVE_SPIDER
    rewards:
      variety_xp:
        type: mcrpg:experience
        skill: MINING
        amount: amount * 20

  # -------------------------------------------------------------------
  # Reward fallback: title command with XP fallback if already owned
  # -------------------------------------------------------------------
  mcrpg:template_champion_challenge:
    display:
      name: "Champion Challenge"
      description: "Prove your worth to earn the Champion title"
    display-name-route: quest-templates.champion-challenge
    board-eligible: true
    scope: mcrpg:single_player
    supported-rarities:
      - mcrpg:rare
      - mcrpg:epic
      - mcrpg:legendary
    variables:
      kill_count:
        type: RANGE
        base:
          min: 30
          max: 60
    phases:
      trial:
        completion-mode: ALL
        stages:
          combat_trial:
            objectives:
              slay_monsters:
                type: mcrpg:mob_kill
                required-progress: kill_count
                config:
                  mobs:
                    - ZOMBIE
                    - SKELETON
                    - CREEPER
                    - SPIDER
                    - ENDERMAN
    rewards:
      champion_title:
        type: mcrpg:command
        display: "Champion Title"
        commands:
          - "title grant {player} champion"
        fallback:
          condition:
            permission: "mcrpg.title.champion"
          reward:
            type: mcrpg:experience
            skill: SWORDS
            amount: 2000
      combat_xp:
        type: mcrpg:experience
        skill: SWORDS
        amount: kill_count * 40
