#
# Objective description route:
#   quests.<namespace>.<quest_key>.objectives.<objective_key>.description
#
# For multi-line objective descriptions (e.g. mob type lists), use \n as a separator.
# Translators: add the same routes in a DynamicLocale file under
#   plugins/McRPG/localization/<language>/ to override these English strings.
# -----------------------------------------------------------------------

