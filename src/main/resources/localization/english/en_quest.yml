  botanical-collector: "Botanical Collector"
  # Mixed / Advanced
  mine-and-fight: "Mine & Fight"
  choose-path: "Choose Your Path"
  lucky-strike: "Lucky Strike"
  veteran-miner: "Veteran Miner"
  daily-variety: "Daily Variety"
  champion-challenge: "Champion Challenge"
