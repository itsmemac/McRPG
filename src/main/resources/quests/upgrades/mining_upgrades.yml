# Ability upgrade quests for Mining abilities (tiers 2–5).
#
# T2/T3: Single objective. Ore tier escalates per tier.
# T4/T5: Two independent objectives in one stage — both must complete.
#         Primary = the established ore group.
#         Secondary = a harder/rarer ore category on its own progress bar.
#
# See docs/design-principles/upgrade-quest-design-principles.md for full rationale.

quests:
  # ────────────────────────────────────────────
  #  It's A Triple  (multi-drop)
  #  Theme: common → precious → rare ores, unlocking triple drops at each tier
  # ────────────────────────────────────────────
  mcrpg:its_a_triple_tier2:
    display:
      name: "Common Extraction"
      description: "Mine coal and copper to practice your triple strike"
      objectives:
        its_a_triple_tier2_obj: "Mine coal and copper ores"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:its_a_triple
        tier: 2
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:its_a_triple_tier2_stage
            objectives:
              objective:
                key: mcrpg:its_a_triple_tier2_obj
                type: mcrpg:block_break
                required-progress: 80
                config:
                  blocks: [COAL_ORE, DEEPSLATE_COAL_ORE, COPPER_ORE, DEEPSLATE_COPPER_ORE]

  mcrpg:its_a_triple_tier3:
    display:
      name: "Iron Frenzy"
      description: "Extract iron ore to sharpen your triple-drop technique"
      objectives:
        its_a_triple_tier3_obj: "Mine iron ores"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
