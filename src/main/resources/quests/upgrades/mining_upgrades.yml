# Ability upgrade quests for Mining abilities (tiers 2–5).
#
# T2/T3: Single objective. Ore targets escalate in rarity per tier.
# T4/T5: Two independent objectives in one stage — both must complete.
#         Primary = the ability's established ore theme.
#         Secondary = a harder/rarer ore group on its own progress bar.
#
# See docs/design-principles/upgrade-quest-design-principles.md for full rationale.

quests:
  # ────────────────────────────────────────────
  #  It's A Triple  (common ore multiplication)
  #  Theme: climbs from the most common ores up through mid-tier and into rare ores
  # ────────────────────────────────────────────
  mcrpg:its_a_triple_tier2:
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:its_a_triple
        tier: 2
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:its_a_triple_tier2_stage
            objectives:
              objective:
                key: mcrpg:its_a_triple_tier2_obj
                type: mcrpg:block_break
                required-progress: 80
                config:
                  blocks: [COAL_ORE, DEEPSLATE_COAL_ORE, COPPER_ORE, DEEPSLATE_COPPER_ORE]

  mcrpg:its_a_triple_tier3:
