          stage:
            key: mcrpg:its_a_triple_tier4_stage
            objectives:
              primary:
                key: mcrpg:its_a_triple_tier4_primary
                type: mcrpg:block_break
                required-progress: 150
                config:
                  blocks: [IRON_ORE, DEEPSLATE_IRON_ORE, GOLD_ORE, DEEPSLATE_GOLD_ORE]
              secondary:
                key: mcrpg:its_a_triple_tier4_secondary
                type: mcrpg:block_break
                required-progress: 60
                config:
                  blocks: [REDSTONE_ORE, DEEPSLATE_REDSTONE_ORE, LAPIS_ORE, DEEPSLATE_LAPIS_ORE]

  mcrpg:its_a_triple_tier5:
