      description: "Mine precious ores and seek rare secondary deposits"
      objectives:
        its_a_triple_tier4_primary: "Mine iron and gold ores"
        its_a_triple_tier4_secondary: "Mine redstone and lapis ores"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
