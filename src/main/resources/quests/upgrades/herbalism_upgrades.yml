# Ability upgrade quests for Herbalism abilities (tiers 2–5).
#
# T2/T3: Single objective. Crop variety escalates per tier.
# T4/T5: Two independent objectives in one stage — both must complete.
#         Primary = the established crop group.
#         Secondary = rarer or exotic crops on their own progress bar.
#
# See docs/design-principles/upgrade-quest-design-principles.md for full rationale.

quests:
  # ────────────────────────────────────────────
  #  Verdant Surge  (XP / growth burst)
  #  Theme: common farm crops → gourds → exotic/Nether plants
  # ────────────────────────────────────────────
  mcrpg:verdant_surge_tier2:
    display:
      name: "First Harvest"
      description: "Harvest basic farm crops to grow your verdant power"
      objectives:
        verdant_surge_tier2_obj: "Harvest wheat and carrots"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:verdant_surge
        tier: 2
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:verdant_surge_tier2_stage
            objectives:
              objective:
                key: mcrpg:verdant_surge_tier2_obj
                type: mcrpg:block_break
                required-progress: 120
                config:
                  blocks: [WHEAT, CARROTS]

  mcrpg:verdant_surge_tier3:
    display:
      name: "Root Harvest"
      description: "Tend to a wider variety of farm crops"
      objectives:
        verdant_surge_tier3_obj: "Harvest wheat, carrots, potatoes, and beetroots"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:verdant_surge
        tier: 3
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:verdant_surge_tier3_stage
            objectives:
              objective:
                key: mcrpg:verdant_surge_tier3_obj
                type: mcrpg:block_break
                required-progress: 200
                config:
                  blocks: [WHEAT, CARROTS, POTATOES, BEETROOTS]

  mcrpg:verdant_surge_tier4:
    display:
      name: "Garden Expansion"
      description: "Harvest core crops and seek out gourd produce"
      objectives:
        verdant_surge_tier4_primary: "Harvest wheat, carrots, potatoes, and beetroots"
        verdant_surge_tier4_secondary: "Harvest melons and pumpkins"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:verdant_surge
        tier: 4
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:verdant_surge_tier4_stage
            objectives:
              primary:
                key: mcrpg:verdant_surge_tier4_primary
                type: mcrpg:block_break
                required-progress: 300
                config:
                  blocks: [WHEAT, CARROTS, POTATOES, BEETROOTS]
              secondary:
                key: mcrpg:verdant_surge_tier4_secondary
                type: mcrpg:block_break
                required-progress: 80
                config:
                  blocks: [MELON, PUMPKIN]

  mcrpg:verdant_surge_tier5:
    display:
      name: "Exotic Garden"
      description: "Complete your mastery with rare and exotic crops"
      objectives:
        verdant_surge_tier5_primary: "Harvest core Overworld crops"
        verdant_surge_tier5_secondary: "Harvest nether wart and cocoa beans"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:verdant_surge
        tier: 5
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:verdant_surge_tier5_stage
            objectives:
              primary:
                key: mcrpg:verdant_surge_tier5_primary
                type: mcrpg:block_break
                required-progress: 400
                config:
                  blocks: [WHEAT, CARROTS, POTATOES, BEETROOTS, MELON, PUMPKIN]
              secondary:
                key: mcrpg:verdant_surge_tier5_secondary
                type: mcrpg:block_break
                required-progress: 60
                config:
                  blocks: [NETHER_WART, COCOA]

  # ────────────────────────────────────────────
  #  Mass Harvest  (AoE harvest)
  #  Theme: bulk staple crops → forageable plants → exotic end-game plants
  # ────────────────────────────────────────────
  mcrpg:mass_harvest_tier2:
    display:
      name: "Bulk Harvest"
