                type: mcrpg:block_break
                required-progress: 200
                config:
                  blocks: [WHEAT, POTATOES, BEETROOTS, SUGAR_CANE]

  mcrpg:mass_harvest_tier4:
    display:
      name: "Berry and Grain"
      description: "Harvest staple crops and forage for sweet berry bushes"
      objectives:
        mass_harvest_tier4_primary: "Harvest wheat, potatoes, beetroots, and sugar cane"
        mass_harvest_tier4_secondary: "Harvest sweet berry bushes"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:mass_harvest
        tier: 4
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:mass_harvest_tier4_stage
            objectives:
              primary:
