      name: "Venom and Decay"
      description: "Overcome venomous threats and face the Nether's wither servants"
      objectives:
        enhanced_bleed_tier4_primary: "Slay spiders, cave spiders, and witches"
        enhanced_bleed_tier4_secondary: "Slay wither skeletons"
