# Ability upgrade quests for Swords abilities (tiers 2–5).
#
# T2/T3: Single objective. Targets escalate in difficulty per tier.
# T4/T5: Two independent objectives in one stage — both must complete.
#         Primary = the ability's established mob theme.
#         Secondary = a harder mob group on its own progress bar.
#
# See docs/design-principles/upgrade-quest-design-principles.md for full rationale.

quests:
  # ────────────────────────────────────────────
  #  Enhanced Bleed  (venom / DoT)
  #  Theme: venomous and poison-dealing mobs, culminating in Wither Skeletons
  # ────────────────────────────────────────────
  mcrpg:enhanced_bleed_tier2:
    display:
      name: "Arachnid Training"
      description: "Hunt venomous spiders to sharpen your bleed"
      objectives:
        enhanced_bleed_tier2_obj: "Slay spiders and cave spiders"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:enhanced_bleed
        tier: 2
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:enhanced_bleed_tier2_stage
            objectives:
              objective:
                key: mcrpg:enhanced_bleed_tier2_obj
                type: mcrpg:mob_kill
                required-progress: 60
                config:
                  entities: [SPIDER, CAVE_SPIDER]

  mcrpg:enhanced_bleed_tier3:
