        stages:
          stage:
            key: mcrpg:heavy_swing_tier3_stage
            objectives:
              objective:
                key: mcrpg:heavy_swing_tier3_obj
                type: mcrpg:block_break
                required-progress: 150
                config:
                  blocks: [DARK_OAK_LOG, JUNGLE_LOG, ACACIA_LOG]

  mcrpg:heavy_swing_tier4:
    display:
      name: "Exotic Timber"
      description: "Cut dense canopy logs and seek out rare exotic trees"
      objectives:
        heavy_swing_tier4_primary: "Chop dark oak, jungle, and acacia logs"
        heavy_swing_tier4_secondary: "Chop mangrove and cherry logs"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:heavy_swing
        tier: 4
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:heavy_swing_tier4_stage
            objectives:
              primary:
                key: mcrpg:heavy_swing_tier4_primary
                type: mcrpg:block_break
                required-progress: 200
                config:
                  blocks: [DARK_OAK_LOG, JUNGLE_LOG, ACACIA_LOG]
              secondary:
                key: mcrpg:heavy_swing_tier4_secondary
                type: mcrpg:block_break
                required-progress: 80
                config:
                  blocks: [MANGROVE_LOG, CHERRY_LOG]

  mcrpg:heavy_swing_tier5:
    display:
      name: "Otherworldly Harvest"
      description: "Fell the most exotic wood including Nether fungal stems"
      objectives:
        heavy_swing_tier5_primary: "Chop dense canopy and mangrove logs"
        heavy_swing_tier5_secondary: "Chop crimson and warped stems"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:heavy_swing
        tier: 5
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:heavy_swing_tier5_stage
            objectives:
              primary:
                key: mcrpg:heavy_swing_tier5_primary
                type: mcrpg:block_break
                required-progress: 250
                config:
                  blocks: [DARK_OAK_LOG, JUNGLE_LOG, ACACIA_LOG, MANGROVE_LOG, CHERRY_LOG]
              secondary:
                key: mcrpg:heavy_swing_tier5_secondary
                type: mcrpg:block_break
                required-progress: 80
                config:
                  blocks: [CRIMSON_STEM, WARPED_STEM]

