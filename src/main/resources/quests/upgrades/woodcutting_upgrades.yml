# Ability upgrade quests for Woodcutting abilities (tiers 2–5).
#
# T2/T3: Single objective. Wood types escalate by biome rarity.
# T4/T5: Two independent objectives in one stage — both must complete.
#         Primary = the established wood group.
#         Secondary = rarer or more exotic logs/stems on their own progress bar.
#
# See docs/design-principles/upgrade-quest-design-principles.md for full rationale.

quests:
  # ────────────────────────────────────────────
  #  Heavy Swing  (cleaving / AoE chop)
  #  Theme: common → dense canopy → exotic wood, culminating in Nether stems
  # ────────────────────────────────────────────
  mcrpg:heavy_swing_tier2:
    display:
      name: "Temperate Lumberjack"
      description: "Fell temperate forest trees with your heavy swing"
      objectives:
        heavy_swing_tier2_obj: "Chop oak, spruce, and birch logs"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:heavy_swing
        tier: 2
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:heavy_swing_tier2_stage
            objectives:
              objective:
                key: mcrpg:heavy_swing_tier2_obj
                type: mcrpg:block_break
                required-progress: 100
                config:
                  blocks: [OAK_LOG, SPRUCE_LOG, BIRCH_LOG]

  mcrpg:heavy_swing_tier3:
    display:
      name: "Dense Canopy Cutter"
      description: "Clear dark and jungle canopy trees with powerful swings"
      objectives:
        heavy_swing_tier3_obj: "Chop dark oak, jungle, and acacia logs"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:heavy_swing
        tier: 3
    phases:
      phase:
