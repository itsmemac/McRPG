# Ability upgrade quests for Woodcutting abilities (tiers 2–5).
#
# T2/T3: Single objective. Log types escalate in rarity/biome per tier.
# T4/T5: Two independent objectives in one stage — both must complete.
#         Primary = the ability's established log family.
#         Secondary = an exotic or otherworldly wood type on its own progress bar.
#
# See docs/design-principles/upgrade-quest-design-principles.md for full rationale.

quests:
  # ────────────────────────────────────────────
  #  Heavy Swing  (raw power / hardwood deforestation)
  #  Theme: common temperate logs → dense canopy logs → exotic woods → nether stems
  # ────────────────────────────────────────────
  mcrpg:heavy_swing_tier2:
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:heavy_swing
        tier: 2
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:heavy_swing_tier2_stage
            objectives:
              objective:
                key: mcrpg:heavy_swing_tier2_obj
                type: mcrpg:block_break
                required-progress: 80
                config:
                  blocks: [OAK_LOG, SPRUCE_LOG, BIRCH_LOG]

  mcrpg:heavy_swing_tier3:
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
