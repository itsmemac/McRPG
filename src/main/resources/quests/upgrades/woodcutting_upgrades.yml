        stages:
          stage:
            key: mcrpg:heavy_swing_tier4_stage
            objectives:
              primary:
                key: mcrpg:heavy_swing_tier4_primary
                type: mcrpg:block_break
                required-progress: 150
                config:
                  blocks: [DARK_OAK_LOG, JUNGLE_LOG, ACACIA_LOG]
              secondary:
                key: mcrpg:heavy_swing_tier4_secondary
                type: mcrpg:block_break
