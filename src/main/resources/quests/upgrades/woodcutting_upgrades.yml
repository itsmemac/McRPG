        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:heavy_swing_tier5_stage
            objectives:
              primary:
                key: mcrpg:heavy_swing_tier5_primary
                type: mcrpg:block_break
                required-progress: 200
                config:
                  blocks: [DARK_OAK_LOG, JUNGLE_LOG, ACACIA_LOG, MANGROVE_LOG]
              secondary:
                key: mcrpg:heavy_swing_tier5_secondary
                type: mcrpg:block_break
                required-progress: 50
                config:
                  blocks: [CRIMSON_STEM, WARPED_STEM]

