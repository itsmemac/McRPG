# Generic (formula-scaled) ability upgrade quests — one per tierable ability.
#
# These quests use the mcrpg:ability_upgrade_next_tier reward type, which upgrades
# the ability to currentTier + 1 rather than a fixed tier. The required-progress
# expression is evaluated at quest-start time with the {tier} variable set to the
# target tier (i.e., currentTier + 1).
#
# These fallback quests are NEVER used for tiers 2–5 by default because the
# per-skill files (swords_upgrades.yml, mining_upgrades.yml, etc.) supply explicit
# per-tier override quests that take precedence via the skill config. They exist as:
#   - A safety net for any future tier beyond 5.
#   - A simpler repeatable quest for server owners who prefer one quest per ability.
#
# Target lists are the full superset of all tier-specific targets for the ability.
# Formulas are tuned per skill group (see docs/design-principles/upgrade-quest-design-principles.md).

quests:
  # ────────────────────────────────────────────
  #  Swords  (mob_kill)  — formula: 15*(tier^2)
  # ────────────────────────────────────────────
  mcrpg:enhanced_bleed_upgrade:
    display:
      name: "Enhanced Bleed Mastery"
      description: "Continue improving Enhanced Bleed by hunting venomous mobs"
      objectives:
        enhanced_bleed_upgrade_obj: "Slay spiders, witches, and wither skeletons"
      rewards:
        upgrade: "Ability Upgrade"
    scope: mcrpg:single_player
    repeat-mode: REPEATABLE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade_next_tier
        ability: mcrpg:enhanced_bleed
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:enhanced_bleed_upgrade_stage
            objectives:
              objective:
                key: mcrpg:enhanced_bleed_upgrade_obj
                type: mcrpg:mob_kill
                required-progress: "15*(tier^2)"
                config:
                  entities: [SPIDER, CAVE_SPIDER, WITCH, WITHER_SKELETON]

